---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: whoami
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      # Pod-level security context for Restricted policy
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - name: whoami
          image: traefik/whoami:latest
          env:
            - name: WHOAMI_PORT_NUMBER
              value: "8080"
          ports:
            - containerPort: 8080
              name: http
          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          # Resource limits are mandatory for quality of service and restricted environments
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 4Mi
            limits:
              cpu: 200m
              memory: 128Mi
              ephemeral-storage: 8Mi
          # Since we are on a read-only FS, we might need a temporary volume if the app tries to write logs or temp files.
          # 'traefik/whoami' is very simple and usually doesn't need this, but it's good practice with readOnlyRootFilesystem.
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir: {}
